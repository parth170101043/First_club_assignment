<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · FirstClub</title>
    <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f1e8;color:#18221b;font-family:Inter,system-ui,sans-serif}
        main{width:min(420px,calc(100% - 32px));padding:36px;background:#fff;border:1px solid #dedbd1;border-radius:22px;box-shadow:0 18px 45px #174f3b1a}
        h1{margin:0 0 8px;font-family:Georgia,serif;font-size:2.5rem;font-weight:500}.muted{color:#667069;margin:0 0 28px}
        label{display:block;margin:16px 0 7px;font-weight:700}input{width:100%;padding:13px;border:1px solid #c9cdc9;border-radius:10px;font:inherit;box-sizing:border-box}
        button{width:100%;margin-top:24px;padding:13px;border:0;border-radius:999px;background:#174f3b;color:#fff;font-weight:800;cursor:pointer}
        .notice{padding:11px;border-radius:9px;background:#e7f3eb;color:#174f3b}.error{background:#fde9e7;color:#8c2920}
        a{color:#174f3b;font-weight:700}.footer{text-align:center;margin-top:22px}
    </style>
</head>
<body>
<main>
    <h1>Welcome back.</h1>
    <p class="muted">Sign in to manage your membership and perks.</p>
    
    
    
    <form action="/login" method="post"><input type="hidden" name="_csrf" value="sgIfYh24-7A4xfy8MgyHyRYn3yEZUlAgmRR-xhwkCGX5nOUoh2R9UX6NwogVppjdACGzqiYf8kMqZGUN_SJIoCVGMQDB-ocb"/>
        <label for="username">Email</label>
        <input id="username" name="username" type="email" autocomplete="email" required autofocus>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit">Sign in</button>
    </form>
    <p class="footer">New here? <a href="/signup">Create an account</a></p>
</main>
</body>
</html>

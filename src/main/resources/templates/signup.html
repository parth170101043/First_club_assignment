<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account · FirstClub</title>
    <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f1e8;color:#18221b;font-family:Inter,system-ui,sans-serif;padding:28px 0}
        main{width:min(520px,calc(100% - 32px));padding:36px;background:#fff;border:1px solid #dedbd1;border-radius:22px}
        h1{margin:0 0 8px;font-family:Georgia,serif;font-size:2.5rem;font-weight:500}.muted{color:#667069;margin:0 0 24px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
        label{display:block;margin:10px 0 7px;font-weight:700}input{width:100%;padding:13px;border:1px solid #c9cdc9;border-radius:10px;font:inherit;box-sizing:border-box}
        button{width:100%;margin-top:24px;padding:13px;border:0;border-radius:999px;background:#174f3b;color:#fff;font-weight:800;cursor:pointer}
        .error{display:block;color:#a42e24;font-size:.85rem;margin-top:5px}a{color:#174f3b;font-weight:700}.footer{text-align:center;margin-top:22px}
        @media(max-width:560px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<main>
    <h1>Join FirstClub.</h1>
    <p class="muted">Create your secure member account.</p>
    <form th:action="@{/signup}" th:object="${signupForm}" method="post">
        <div class="grid">
            <div><label for="firstName">First name</label><input id="firstName" th:field="*{firstName}" required><span class="error" th:errors="*{firstName}"></span></div>
            <div><label for="lastName">Last name</label><input id="lastName" th:field="*{lastName}" required><span class="error" th:errors="*{lastName}"></span></div>
            <div class="full"><label for="email">Email</label><input id="email" type="email" th:field="*{email}" required><span class="error" th:errors="*{email}"></span></div>
            <div class="full"><label for="cohort">Cohort (optional)</label><input id="cohort" th:field="*{cohort}"></div>
            <div><label for="password">Password</label><input id="password" type="password" th:field="*{password}" minlength="8" required><span class="error" th:errors="*{password}"></span></div>
            <div><label for="confirmPassword">Confirm password</label><input id="confirmPassword" type="password" th:field="*{confirmPassword}" minlength="8" required><span class="error" th:errors="*{confirmPassword}"></span></div>
        </div>
        <button type="submit">Create account</button>
    </form>
    <p class="footer">Already a member? <a th:href="@{/login}">Sign in</a></p>
</main>
</body>
</html>

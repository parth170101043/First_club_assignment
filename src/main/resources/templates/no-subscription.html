<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Choose membership · FirstClub</title>
    <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f1e8;color:#18221b;font-family:Inter,system-ui,sans-serif}
        main{width:min(620px,calc(100% - 32px));padding:44px;background:#fff;border:1px solid #dedbd1;border-radius:24px;text-align:center}
        h1{margin:0 0 14px;font:500 3rem Georgia,serif}.muted{color:#667069;line-height:1.7}
        a,button{display:inline-block;margin-top:20px;padding:13px 22px;border:0;border-radius:999px;background:#174f3b;color:#fff;font-weight:800;text-decoration:none;cursor:pointer}
        form{display:inline}.secondary{background:transparent;color:#174f3b}
    </style>
</head>
<body>
<main>
    <p th:text="${email}">member@example.com</p>
    <h1>Your account is ready.</h1>
    <p class="muted">Choose a membership plan and tier to unlock FirstClub perks.</p>
    <a th:href="@{/shop}">Browse products and order</a>
    <a class="secondary" th:href="@{/memberships}">Choose a membership</a>
    <form th:action="@{/logout}" method="post"><button class="secondary" type="submit">Sign out</button></form>
</main>
</body>
</html>

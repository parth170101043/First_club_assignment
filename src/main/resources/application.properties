# Configures the FirstClub service, PostgreSQL connection, Flyway, JPA, and expiry scheduler.
spring.application.name=FirstClubApp

# Override these defaults with DB_URL, DB_USERNAME, and DB_PASSWORD when needed.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/firstclub}
spring.datasource.username=${DB_USERNAME:firstclub}
spring.datasource.password=${DB_PASSWORD:firstclub}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

membership.expiry-job-delay-ms=60000

# Behavioral tiers are evaluated from independent signals and combined by highest tier rank.
membership.behavior.order-count.gold=5
membership.behavior.order-count.platinum=10
membership.behavior.monthly-spend.gold=5000
membership.behavior.monthly-spend.platinum=15000
membership.behavior.cohort.gold=EARLY_ADOPTER
membership.behavior.cohort.platinum=VIP

# Optional first administrator. Set both environment variables for initial admin access.
firstclub.admin.email=${FIRSTCLUB_ADMIN_EMAIL:}
firstclub.admin.password=${FIRSTCLUB_ADMIN_PASSWORD:}

# Harden the browser session cookie. Set secure=true in HTTPS deployments.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=30m
